<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheSites | Iniciar Sesión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-light: #faf9f6;       /* Fondo crema característico */
            --bg-card: #ffffff;
            --text-dark: #121212;
            --text-muted: #65676b;
            --accent-sites: #008080;   /* Verde Teal */
            --accent-hover: #006666;
            --border-soft: rgba(0, 0, 0, 0.1);
            --error-color: #de350b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            padding: 40px 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.02);
            text-align: center;
        }

        .brand-logo {
            color: var(--accent-sites);
            font-weight: 800;
            font-size: 26px;
            letter-spacing: -0.5px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 28px;
        }

        .auth-container h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        /* FORMULARIOS */
        .form-group {
            text-align: left;
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 15px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--accent-sites);
        }

        .btn-auth-submit {
            width: 100%;
            background-color: var(--accent-sites);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .btn-auth-submit:hover {
            background-color: var(--accent-hover);
        }

        .auth-footer {
            margin-top: 24px;
            font-size: 13.5px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent-sites);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* ALERTAS DE ERROR */
        .error-message {
            background-color: rgba(222, 53, 11, 0.06);
            color: var(--error-color);
            border: 1px solid rgba(222, 53, 11, 0.15);
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            display: none;
            text-align: left;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="index.html" class="brand-logo">
            <i class="fa-solid fa-map-location-dot"></i> TheSites
        </a>
        <h1>Te damos la bienvenida</h1>
        <p class="auth-subtitle">Ingresa tus datos para gestionar tus ubicaciones</p>

        <div class="error-message" id="error-box">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="error-text">Credenciales incorrectas.</span>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-auth-submit">Iniciar Sesión</button>
        </form>

        <div class="auth-footer">
            ¿No tienes una cuenta? <a href="register.html">Regístrate aquí</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Configuración oficial provista
        const firebaseConfig = {
            apiKey: "AIzaSyB0XnYCA-jVNsGowSeXpEb4OwUnQZLOitk",
            authDomain: "thesites2.firebaseapp.com",
            projectId: "thesites2",
            storageBucket: "thesites2.firebasestorage.app",
            messagingSenderId: "372232227026",
            appId: "1:372232227026:web:77d458d036066ff024450b",
            measurementId: "G-YL2GDDMJSP"
        };

        // Inicializar Firebase e Interface de Auth
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('login-form');
        const errorBox = document.getElementById('error-box');
        const errorText = document.getElementById('error-text');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none'; // Resetear error

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                // Autenticación modular nativa
                await signInWithEmailAndPassword(auth, email, password);
                // Éxito: Redirigir al panel de búsqueda
                window.location.href = "home.html";
            } catch (error) {
                errorBox.style.display = 'flex';
                // Traducir los errores más comunes de Firebase
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                    errorText.innerText = "El correo o la contraseña son incorrectos.";
                } else if (error.code === 'auth/invalid-email') {
                    errorText.innerText = "El formato del correo electrónico no es válido.";
                } else {
                    errorText.innerText = "Ocurrió un error inesperado: " + error.message;
                }
            }
        });
    </script>
</body>
</html>
