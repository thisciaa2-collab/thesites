<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheSites | Registro de Cuenta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-light: #faf9f6;
            --bg-card: #ffffff;
            --text-dark: #121212;
            --text-muted: #65676b;
            --accent-sites: #008080;
            --accent-hover: #006666;
            --border-soft: rgba(0, 0, 0, 0.1);
            --error-color: #de350b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            padding: 40px 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.02);
            text-align: center;
        }

        .brand-logo {
            color: var(--accent-sites);
            font-weight: 800;
            font-size: 26px;
            letter-spacing: -0.5px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .auth-container h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        /* FORMULARIOS */
        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 15px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--accent-sites);
        }

        .btn-auth-submit {
            width: 100%;
            background-color: var(--accent-sites);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .btn-auth-submit:hover {
            background-color: var(--accent-hover);
        }

        /* DIVIDER */
        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 22px 0;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-soft);
        }

        .auth-divider:not(:empty)::before { margin-right: .75em; }
        .auth-divider:not(:empty)::after { margin-left: .75em; }

        /* BOTONES SOCIALES */
        .social-buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-social {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            border: 1px solid #cccccc;
        }

        .btn-social-google {
            background-color: #ffffff;
            color: #3c4043;
        }

        .btn-social-google:hover {
            background-color: #f8f9fa;
            border-color: #b0b4b8;
        }

        .btn-social-google i {
            color: #ea4335;
        }

        .btn-social-github {
            background-color: #24292f;
            color: #ffffff;
            border-color: #24292f;
        }

        .btn-social-github:hover {
            background-color: #1a1e22;
            border-color: #1a1e22;
        }

        .auth-footer {
            margin-top: 24px;
            font-size: 13.5px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent-sites);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* ALERTAS DE ERROR */
        .error-message {
            background-color: rgba(222, 53, 11, 0.06);
            color: var(--error-color);
            border: 1px solid rgba(222, 53, 11, 0.15);
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            display: none;
            text-align: left;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="index.html" class="brand-logo">
            <i class="fa-solid fa-map-location-dot"></i> TheSites
        </a>
        <h1>Crea tu cuenta global</h1>
        <p class="auth-subtitle">Regístrate para empezar a buscar y añadir lugares</p>

        <div class="error-message" id="error-box">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="error-text">Ocurrió un error.</span>
        </div>

        <form id="register-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" placeholder="tu_correo@ejemplo.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirmar Contraseña</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-shield-halved"></i>
                    <input type="password" id="confirm-password" placeholder="Repite tu contraseña" required>
                </div>
            </div>

            <button type="submit" class="btn-auth-submit">Registrarse e Ingresar</button>
        </form>

        <div class="auth-divider">O registrarse con</div>

        <div class="social-buttons-grid">
            <button type="button" class="btn-social btn-social-google" id="btn-google">
                <i class="fa-brands fa-google"></i> Registrarse con Google
            </button>
            <button type="button" class="btn-social btn-social-github" id="btn-github">
                <i class="fa-brands fa-github"></i> Registrarse con GitHub
            </button>
        </div>

        <div class="auth-footer">
            ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, GithubAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0XnYCA-jVNsGowSeXpEb4OwUnQZLOitk",
            authDomain: "thesites2.firebaseapp.com",
            projectId: "thesites2",
            storageBucket: "thesites2.firebasestorage.app",
            messagingSenderId: "372232227026",
            appId: "1:372232227026:web:77d458d036066ff024450b",
            measurementId: "G-YL2GDDMJSP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const googleProvider = new GoogleAuthProvider();
        const githubProvider = new GithubAuthProvider();

        const registerForm = document.getElementById('register-form');
        const errorBox = document.getElementById('error-box');
        const errorText = document.getElementById('error-text');

        function mostrarError(mensaje) {
            errorBox.style.display = 'flex';
            errorText.innerText = mensaje;
        }

        // 1. REGISTRO TRADICIONAL
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                mostrarError("Las contraseñas ingresadas no coinciden.");
                return;
            }

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                window.location.href = "home.html";
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    mostrarError("Este correo ya está registrado en la plataforma.");
                } else {
                    mostrarError("Error en el servidor: " + error.message);
                }
            }
        });

        // 2. AUTH GOOGLE POPUP
        document.getElementById('btn-google').addEventListener('click', async () => {
            errorBox.style.display = 'none';
            try {
                await signInWithPopup(auth, googleProvider);
                window.location.href = "home.html";
            } catch (error) {
                if (error.code !== 'auth/popup-closed-by-user') {
                    mostrarError("Error al registrar con Google: " + error.message);
                }
            }
        });

        // 3. AUTH GITHUB POPUP
        document.getElementById('btn-github').addEventListener('click', async () => {
            errorBox.style.display = 'none';
            try {
                await signInWithPopup(auth, githubProvider);
                window.location.href = "home.html";
            } catch (error) {
                if (error.code !== 'auth/popup-closed-by-user') {
                    mostrarError("Error al registrar con GitHub: " + error.message);
                }
            }
        });
    </script>
</body>
</html>
