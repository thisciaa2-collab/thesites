<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TheSites | Panel Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #008080; --glass: rgba(255, 255, 255, 0.7); }
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #f0f4f4 0%, #dbe8e8 100%); min-height: 100vh; margin: 0; padding: 40px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 0 auto 40px; }
        .search-box { background: var(--glass); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        #search { width: 100%; border: none; background: transparent; font-size: 18px; outline: none; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 900px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 20px; transition: 0.4s; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,128,128,0.15); border-color: var(--accent); }
        h3 { margin: 0 0 10px 0; color: #1a1a1a; font-weight: 800; }
        .tag { background: #e0f2f1; color: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="font-weight: 800; letter-spacing: -1px;">TheSites</h1>
        <button id="logout" style="border:none; background:transparent; cursor:pointer;">Cerrar Sesión</button>
    </div>

    <div class="search-box">
        <input type="text" id="search" placeholder="🔍 Buscar lugar verificado...">
    </div>

    <div class="grid" id="results"></div>
    
    </body>
</html>
