<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TheSites | Panel Principal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --accent: #008080; --bg: #faf9f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; }
        .nav { padding: 20px 40px; background: white; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .container { max-width: 900px; margin: 40px auto; padding: 20px; }
        #search-input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; cursor: pointer; transition: 0.3s; border: 1px solid #eee; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .type-tag { font-size: 10px; text-transform: uppercase; color: var(--accent); font-weight: 800; }
    </style>
</head>
<body>
    <header class="nav">
        <h2>TheSites</h2>
        <button id="logout">Cerrar Sesión</button>
    </header>

    <div class="container">
        <input type="text" id="search-input" placeholder="¿Qué lugar buscas? (Ej: Sanatorio, Colegio, Farmacia...)">
        <div class="grid" id="results-grid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0XnYCA-jVNsGowSeXpEb4OwUnQZLOitk",
            authDomain: "thesites2.firebaseapp.com",
            projectId: "thesites2",
            storageBucket: "thesites2.firebasestorage.app",
            messagingSenderId: "372232227026",
            appId: "1:372232227026:web:77d458d036066ff024450b",
            measurementId: "G-YL2GDDMJSP"
        };
        initializeApp(firebaseConfig);
        const auth = getAuth();

        // Base de datos de conexión (Idéntica a la de location.html)
        const baseDatosLugares = [
            { id: "sch_andres_bello", nombre: "Colegio Andrés Bello", comuna: "Chiguayante", type: "school", keywords: ["colegio", "andres", "bello", "chiguayante"] },
            { id: "sanatorio_aleman", nombre: "Sanatorio Alemán", comuna: "Concepción", type: "health", keywords: ["sanatorio", "aleman", "clinica", "medico"] },
            { id: "farmacia_colo_colo", nombre: "Farmacia Colo-Colo (Chilena)", comuna: "Concepción", type: "service", keywords: ["farmacia", "chilena", "colo", "colo", "medicamentos"] },
            { id: "open_pinares", nombre: "Open Pinares", comuna: "Chiguayante", type: "service", keywords: ["open", "pinares", "comercial", "gastronomia"] }
        ];

        function render(filter = "") {
            const grid = document.getElementById('results-grid');
            grid.innerHTML = "";
            const filtered = baseDatosLugares.filter(l => 
                l.nombre.toLowerCase().includes(filter.toLowerCase()) || 
                l.keywords.some(k => k.includes(filter.toLowerCase()))
            );

            filtered.forEach(l => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<span class="type-tag">${l.type}</span><h3>${l.nombre}</h3><p>${l.comuna}</p>`;
                card.onclick = () => window.location.href = `location.html?type=${l.type}&id=${l.id}`;
                grid.appendChild(card);
            });
        }

        document.getElementById('search-input').oninput = (e) => render(e.target.value);
        document.getElementById('logout').onclick = () => signOut(auth).then(() => window.location.href="login.html");
        
        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "login.html"; });
        render(); // Render inicial
    </script>
</body>
</html>
